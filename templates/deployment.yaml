apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{.release.name}}-deployment

spec:
  replicas: {{.Values.replicas}}

  selector:
    matchLabels:
      app: jeevanlink

  template:
    metadata:
      labels:
        app: {{.Values.labels.app}}

    spec:
      containers:
        - name: {{.Values.container.name}}
          image: {{.Values.container.image}}

          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: jeevanlink-config
                  key: APP_ENV

            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: jeevanlink-config
                  key: APP_NAME

            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: jeevanlink-config
                  key: PORT

            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: jeevanlink-config
                  key: API_URL

---
apiVersion: v1
kind: Service

metadata:
  name: jeevanlink-service

spec:
  type: NodePort

  selector:
    app: jeevanlink

  ports:
    - protocol: TCP
      port: {{values.service.port}}
      targetPort: {{values.service.targetport}}
type
